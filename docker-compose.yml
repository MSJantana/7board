version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "7080:80"
      - "7081:81"
      # Uncomment lines below after setting up SSL certificates
      # - "7443:443"
      # - "7444:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

  backend:
    build: ./backend
    # ports:
    #   - "3001:3001" # Access via Nginx
    environment:
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - PRISMA_SYNC_ON_START=true
      - BOOTSTRAP_STAGES_ON_START=true
      - SEED_ADMIN_ENABLED=true
      - SEED_ADMIN_NAME=${SEED_ADMIN_NAME}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - SEED_ADMIN_RESET_PASSWORD=${SEED_ADMIN_RESET_PASSWORD:-false}
    # depends_on:
    #   - mysql
    volumes:
      - ./backend:/app
      - /app/node_modules

  # mysql:
  #   image: mysql:8.0
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
  #     MYSQL_DATABASE: ${DATABASE_NAME:-seven_board}
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql

  frontend:
    build: ./frontend
    # ports:
    #   - "5173:5173" # Access via Nginx
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_PROXY_TARGET=http://backend:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
