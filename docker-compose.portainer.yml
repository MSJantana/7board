version: '3.8'

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "7080:80"
      # Uncomment lines below after setting up SSL certificates
      # - "7443:443"
      # - "7444:8443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    command: |
      /bin/sh -c 'cat << "EOF" > /etc/nginx/conf.d/default.conf
      client_max_body_size 50m;

      upstream backend {
          server backend:3001;
      }
      upstream frontend {
          server frontend:80;
      }
      server {
          listen 80;
          location /api/ {
              proxy_pass http://backend;
          }
          location /uploads/ {
              proxy_pass http://backend;
          }
          location / {
              proxy_pass http://frontend;
          }
      }
      # HTTPS Servers (Uncomment and ensure certs are present to enable)
      # server {
      #     listen 443 ssl;
      #     ssl_certificate /etc/nginx/certs/fullchain.pem;
      #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
      #     location /api/ { proxy_pass http://backend; proxy_set_header X-Forwarded-Proto https; }
      #     location /uploads/ { proxy_pass http://backend; }
      #     location / { proxy_pass http://frontend; proxy_set_header X-Forwarded-Proto https; }
      # }
      EOF
      nginx -g "daemon off;"'
    depends_on:
      - backend
      - frontend

  backend:
    image: msoftsantana/seven-board-backend:latest
    container_name: MidiaFlow-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: mysql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DB_HOST:-host.docker.internal}:${MYSQL_PORT:-3306}/${DATABASE_NAME}
    volumes:
      - uploads_data:/app/uploads

  frontend:
    image: msoftsantana/seven-board-frontend:latest
    container_name: MidiaFlow-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend

networks:
  default:
    name: sevenboard_net

volumes:
  uploads_data:
